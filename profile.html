<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Guvi Project</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
    <section class="card form-card shadow-sm w-100" style="max-width: 540px;">
      <div class="card-body">
        <img src="assets/logo.svg" width="30" class="mb-2 d-block mx-auto" alt="Guvi logo" />
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="card-title">Profile</h2>
          <button id="logoutBtn" class="btn btn-outline-secondary btn-sm">Logout</button>
        </div>
        <div id="alertPlaceholder"></div>
        <div class="mb-4">
          <p class="mb-1"><strong>Name:</strong> <span id="profileName"></span></p>
          <p class="mb-0"><strong>Email:</strong> <span id="profileEmail"></span></p>
        </div>
        <form id="profileForm" autocomplete="off">
          <div class="mb-3">
            <label for="age" class="form-label">Age</label>
            <input type="number" class="form-control" id="age" placeholder="Enter your age" />
          </div>
          <div class="mb-3">
            <label for="dob" class="form-label">Date of Birth</label>
            <input type="date" class="form-control" id="dob" />
          </div>
          <div class="mb-3">
            <label for="contact" class="form-label">Contact Number</label>
            <input type="tel" class="form-control" id="contact" placeholder="Enter phone number" />
          </div>
          <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <textarea class="form-control" id="address" rows="3" placeholder="Enter a contact address"></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100">Update Profile</button>
        </form>
      </div>
    </section>
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
