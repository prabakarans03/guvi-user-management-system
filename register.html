<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Guvi Project</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="d-flex align-items-center justify-content-center vh-100 bg-light">
    <section class="card form-card shadow-sm">
      <div class="card-body">
        <img src="assets/logo.svg" width="30" class="mb-2 d-block mx-auto" alt="Guvi logo" />
        <h2 class="card-title mb-4 text-center">Register</h2>
        <div id="alertPlaceholder"></div>
        <form id="registerForm" autocomplete="off">
          <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" placeholder="Enter your full name" required />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" placeholder="name@example.com" required />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Create a password" minlength="6" required />
            <div class="form-text">Password must be at least 6 characters.</div>
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign Up</button>
        </form>
        <p class="mt-3 text-center text-muted">Already registered? <a href="login.html">Login</a></p>
      </div>
    </section>
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
